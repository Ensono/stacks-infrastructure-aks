name: stacks-infrastructure-aks
title: Stacks Infrastructure AKS
maintainer: Ensono Digital
copyright: Ensono Digital
copyright_email: stacks@ensono.com
license: Apache-2.0
summary: |
  A profile to test that the infrastructure for AKS has been setup as expected
version: 0.1.0
inspec_version: ">= 2.2.7"
depends:
  - name: inspec-azure
    url: https://github.com/inspec/inspec-azure/archive/v1.118.43.tar.gz
supports:
  - platform: azure

# Define the inputs for the control
inputs:
  - name: resource_group_name
    description: Group containing all the resources for the Azure Kubernertes Cluster
  - name: region
    description: Region that the resources are expected to be deployed into
  - name: dns_prefix
    description: DNS Prefix to be used with Kubernetes
    value: aks
  - name: k8s_version_threshold
    description: Denotes the number versions that are considered valid
    value: 4
  - name: node_pool_count
    description: Expected number of AKS node pools (default pool + additional pools)
    value: 1
  - name: public_ip_sku
    description: Expected SKU for the Application Gateway public IP
    value: Standard
  - name: key_vault
    description: List of key vaults to validate
    value: []
  - name: azure_application_id
    description: Azure application (client) ID used for key vault access policies
    value: ""
  - name: container_registry_name
    description: Name of the Azure Container Registry
    value: ""
  - name: container_registry_sku
    description: SKU of the Azure Container Registry (e.g. Standard, Premium)
    value: Standard
  - name: create_ssl_gateway
    description: Whether the Application Gateway for SSL termination is enabled
    value: true
  - name: app_gateway_name
    description: Name of the Application Gateway resource
    value: ""
  - name: app_gateway_resource_group_name
    description: Resource group containing the Application Gateway
    value: ""
  - name: aks_ingress_private_ip
    description: Static private IP assigned to the nginx-ingress internal load balancer. Must match the Application Gateway backend pool target.
    value: ""
  - name: aks_ingress_public_ip
    description: Public ingress IP exposed by the AKS module. If present and distinct from aks_ingress_private_ip, the Application Gateway backend pool should not target it in this topology.
    value: ""
  - name: app_gateway_backend_address
    description: Expected IP address that the Application Gateway backend pool should target. Computed from Terraform outputs and intended to match aks_ingress_private_ip when is_cluster_private=true.
    value: ""
  - name: is_cluster_private
    description: Whether the AKS cluster is in private mode (controls which ingress IP the App Gateway targets)
    value: false
  - name: create_valid_cert
    description: Whether an ACME-issued trusted certificate should be present on the App Gateway (false means self-signed fallback is acceptable)
    value: true
